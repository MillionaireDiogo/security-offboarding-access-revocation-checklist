name: 👤 Employee Offboarding Checklist
description: Track employee offboarding and access revocation
#title: "Employee Offboarding - [Enter Name]"
labels: ["offboarding", "employee", "security"]
assignees:
  - your-github-username

body:
  - type: input
    id: employee_name
    attributes:
      label: Employee Name
      placeholder: Enter full name
    validations:
      required: true

  - type: input
    id: exit_date
    attributes:
      label: Last Working Day
      placeholder: YYYY-MM-DD
    validations:
      required: true

  - type: input
    id: manager
    attributes:
      label: Manager
      placeholder: Enter manager name
    validations:
      required: true

  - type: checkboxes
    id: initiate
    attributes:
      label: 🚀 Initiate Offboarding
      options:
        - label: Confirm offboarding date with HR
        - label: Notify IT/Security team
        - label: Inventory accounts and access

  - type: checkboxes
    id: access_revocation
    attributes:
      label: 🔐 Revoke Digital Access
      options:
        - label: Disable user in Identity Provider
        - label: Remove from SaaS platforms
        - label: Invalidate sessions and tokens
        - label: Revoke SSH keys, API tokens, VPN
        - label: Reset shared credentials
        - label: Remove MFA/2FA methods
        - label: Remove from MDM

  - type: checkboxes
    id: asset_recovery
    attributes:
      label: 💻 Recover Assets
      options:
        - label: Collect laptops / phones / USBs
        - label: Recover badges / access cards
        - label: Wipe and reimage devices

  - type: checkboxes
    id: ownership_transfer
    attributes:
      label: 📂 Transfer Ownership
      options:
        - label: Reassign email and documents
        - label: Transfer repos / project boards
        - label: Backup user data

  - type: checkboxes
    id: compliance
    attributes:
      label: 📜 Compliance & Logging
      options:
        - label: Log all deprovisioning steps
        - label: Notify HR / Legal
        - label: Archive records